name: Build Snap.Net

on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: true
        type: boolean
env:
  SNAP_VERSION: ${{ vars.SNAP_VERSION }}

jobs:

  build-windows-legacy:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/downloads
          key: vcpkg-${{ runner.os }}-x64-windows-release-v1
          restore-keys: |
            vcpkg-${{ runner.os }}-
      
      - name: Setup vcpkg
        id: vcpkg
        uses: johnwason/vcpkg-action@v7
        with:
          pkgs: libflac libvorbis soxr opus boost-asio boost-beast
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: build snapcast
        run: |
          cd SnapClient/snapcast
          mkdir build -Force
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-release
          cmake --build . --config Release
          cd ../..
          Remove-Item snapclient.exe -ErrorAction Ignore
          Copy-Item "snapcast/bin/Release/*" . -Recurse -Force
          .\snapclient.exe --version


      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild /t:restore

      - name: Build Release
        run: >
          msbuild "/p:Configuration=Release;VersionAssembly=${{ vars.SNAP_VERSION }};AssemblyVersion=${{ vars.SNAP_VERSION }};Version=${{ vars.SNAP_VERSION }}"

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build Installer
        run: ISCC.exe "InnoSetup\SnapSetup.iss"

      - name: Upload Windows Installer
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: Windows-legacy
          path: bin\*.exe
