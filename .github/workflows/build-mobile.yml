name: Build Snap.Net.Mobile

on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: true
        type: boolean
jobs:

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.410'

      - name: Force .NET 7
        run: |
          dotnet new globaljson --sdk-version 7.0.410

      - name: Install Xamarin toolchain
        run: |
          brew install mono
          brew install --cask xamarin-android
          brew install --cask xamarin-ios

      - name: Check Xamarin MSBuild path
        run: |
          ls /Library/Frameworks/Mono.framework/External/xbuild/Xamarin/Android

      - name: Restore NuGet
        run: dotnet restore Snap.Net.sln
     
      - name: Build Android
        run: |
          dotnet build Mobile/Mobile.Android/Snap.Net.Mobile.Android.csproj \
            /t:PackageForAndroid \
            /p:Configuration=Release \
            /p:MSBuildExtensionsPath=/Library/Frameworks/Mono.framework/External/xbuild

      - name: Build iOS
        run: |
          dotnet build Mobile/Mobile.iOS/Snap.Net.Mobile.iOS.csproj \
            /p:Configuration=Release \
            /p:Platform=iPhoneSimulator \
            /t:Build \
            /p:MSBuildExtensionsPath=/Library/Frameworks/Mono.framework/External/xbuild

      - name: Upload Android APK
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            **/*.apk

      - name: Upload iOS app
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            **/*.app
