---
name: Build Snap.Net.Mobile
on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: true
        type: boolean
jobs:
  android:
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android 29 platform
        run: sdkmanager "platforms;android-29"
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/android-sdk
          key: android-sdk-${{ runner.os }}
      - name: Cache Xamarin build
        uses: actions/cache@v4
        with:
          path: |
            **/obj
            **/bin
          key: build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-        
      - name: Restore SDK projects
        run: dotnet restore Snap.Net.SnapClient/Snap.Net.SnapClient.csproj
      - name: Restore Mobile shared project
        run: dotnet restore Mobile/Mobile/Snap.Net.Mobile.csproj
      - name: Restore Android project
        run: nuget restore Mobile/Mobile.Android/Snap.Net.Mobile.Android.csproj
      - name: Build Android
        run: >
          msbuild Mobile/Mobile.Android/Snap.Net.Mobile.Android.csproj
          /t:PackageForAndroid /p:Configuration=Release
      - name: Upload Android APK
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            **/*.apk
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Force .NET 7
        run: dotnet new globaljson --sdk-version 7.0.410
      - name: Install .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.410
      - name: Install Xamarin targets
        run: |
          brew install mono-mdk
          curl -L https://download.visualstudio.microsoft.com/download/pr/b4928191-de3d-42cb-a24f-709e5d71626c/ac849f1f644aee58ed4e7a79cb35a14e/xamarin.ios-16.4.0.6.pkg -o xamarin.pkg
          sudo installer -pkg xamarin.pkg -target /

      - name: Restore
        run: |
          dotnet restore Snap.Net.SnapClient/Snap.Net.SnapClient.csproj
          dotnet restore Mobile/Mobile/Snap.Net.Mobile.csproj

      - name: Restore iOS project
        run: |
          nuget restore Mobile/Mobile.iOS/Snap.Net.Mobile.iOS.csproj

      - name: Build iOS
        run: |
          /Library/Frameworks/Mono.framework/Commands/msbuild \
            Mobile/Mobile.iOS/Snap.Net.Mobile.iOS.csproj \
            /p:Configuration=Release \
            /p:Platform=iPhoneSimulator \
            /p:AllowUnsafeBlocks=true
            
      - name: Dump mtouch response file
        if: always()
        run: |
          echo "Searching for response files..."
          FILE=$(find . -name "response-file.rsp" | head -n 1)
          echo "Found: $FILE"
          echo "------ file contents ------"
          cat "$FILE"            

      - uses: actions/upload-artifact@v4
        if: inputs.upload_artifacts == true
        with:
          name: ios-build
          path: "**/*.app"
